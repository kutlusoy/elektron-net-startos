# .github/workflows/build.yml
name: Build elektrond.s9pk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools squashfs-tools-ng

      - name: Install start-cli
        run: curl -fsSL https://start9.com/start-cli/install.sh | sh

      - name: Initialize packaging workspace
        run: |
          # start-cli expects a "workspace" directory that *contains* the
          # package repo, not the repo itself. Init one in the parent of
          # $GITHUB_WORKSPACE (the checked-out repo).
          cd "$(dirname "$GITHUB_WORKSPACE")"
          start-cli s9pk init-workspace

      - name: Install npm dependencies
        run: npm install

      - name: Init developer key
        run: start-cli init-key

      - name: Compile TypeScript to javascript/index.js
        run: npm run build

      - name: Build s9pk
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elektrond-s9pk
          path: "*.s9pk"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Elektron Net StartOS Release ${{ github.ref_name }}"
          files: "*.s9pk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
